<!DOCTYPE html>
<html>
<head>
    <title>My Store</title>
    <style>
        /* A little bit of basic CSS to make it look like a store */
        .product-grid { display: flex; gap: 20px; flex-wrap: wrap; }
        .product-card { border: 1px solid #ccc; padding: 15px; width: 200px; text-align: center; }
        .cart-status { font-weight: bold; margin-bottom: 20px; }
    </style>
</head>
<body>

    <h1>Welcome to Our Store</h1>
    
    <div class="cart-status">
        <a href="cart.html">View Cart (<span id="cartCount">0</span> items)</a>
    </div>

    <hr>

    <h2>Products</h2>
    <div id="product-list" class="product-grid"></div>

    <script src="index.js"></script>
</body>
</html>
